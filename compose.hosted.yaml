# Hosted overrides for staging/production.
#
# Use alongside the base compose file:
#   docker compose -f compose.yaml -f compose.hosted.yaml ...

services:
  anvil:
    profiles:
      - never

  acme-companion:
    image: nginxproxy/acme-companion
    depends_on:
      nginx-proxy:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/certs:/etc/nginx/certs
      - ./docker/vhost.d:/etc/nginx/vhost.d
      - acme-html:/usr/share/nginx/html
    environment:
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL:-admin@hostr.cc}
      - NGINX_PROXY_CONTAINER=hostr-nginx-proxy-1
    restart: unless-stopped

  nginx-proxy:
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./docker/certs:/etc/nginx/certs
      - ./docker/vhost.d:/etc/nginx/vhost.d
      - ./docker/nginx-proxy.conf:/etc/nginx/conf.d/zzz_upload.conf:ro
      - acme-html:/usr/share/nginx/html

  relay:
    image: ${DOCKER_REGISTRY}/relay:64cfcaf
    build: !reset null
    environment:
      - LETSENCRYPT_HOST=relay.${DOMAIN}

  relay-authz:
    image: ${DOCKER_REGISTRY}/relay-authz:latest
    build: !reset null

  blossom:
    environment:
      - LETSENCRYPT_HOST=blossom.${DOMAIN}

  app:
    image: ${DOCKER_REGISTRY}/app:latest
    environment:
      - LETSENCRYPT_HOST=app.${DOMAIN},${DOMAIN}

  mcp:
    image: ${DOCKER_REGISTRY}/mcp:latest
    environment:
      - LETSENCRYPT_HOST=ai.${DOMAIN}
      - HOSTR_DAEMON_STATE_DIR=/data/mcp
      - HOSTR_DAEMON_LOGS=1
      - HOSTR_DAEMON_LOG_LEVEL=info
    volumes:
      - ./docker/data/mcp:/data/mcp

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.151.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./docker/otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    expose:
      - "4318"
    restart: unless-stopped
    networks:
      - default

  escrow:
    image: ${DOCKER_REGISTRY}/escrow:latest
    restart: unless-stopped
    depends_on:
      nginx-proxy:
        condition: service_healthy
        restart: true
    volumes:
      - ./docker/data/escrow:/data:ro

volumes:
  acme-html:
