# Hosted overrides for staging/production.
#
# Use alongside the base compose file:
#   docker compose -f compose.yaml -f compose.hosted.yaml ...

services:
  tls-init:
    entrypoint: ["true"]
    restart: "no"

  anvil:
    profiles:
      - never

  acme-companion:
    image: nginxproxy/acme-companion
    depends_on:
      nginx-proxy:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/certs:/etc/nginx/certs
      - ./docker/vhost.d:/etc/nginx/vhost.d
      - acme-html:/usr/share/nginx/html
    environment:
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL:-admin@hostr.cc}
      - NGINX_PROXY_CONTAINER=hostr-nginx-proxy-1
    restart: unless-stopped

  nginx-proxy:
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./docker/certs:/etc/nginx/certs
      - ./docker/vhost.d:/etc/nginx/vhost.d
      - ./docker/nginx-proxy.conf:/etc/nginx/conf.d/zzz_upload.conf:ro
      - acme-html:/usr/share/nginx/html

  relay:
    environment:
      - LETSENCRYPT_HOST=relay.${DOMAIN}

  blossom:
    environment:
      - LETSENCRYPT_HOST=blossom.${DOMAIN}

  landing-page:
    image: ${DOCKER_REGISTRY}/landing-page:latest
    environment:
      - LETSENCRYPT_HOST=landing.${DOMAIN},${DOMAIN}

  app:
    image: ${DOCKER_REGISTRY}/app:latest
    environment:
      - LETSENCRYPT_HOST=app.${DOMAIN}

  paymaster:
    image: accountabstraction/bundler:0.7.0
    command:
      - --port
      - "3000"
      - --network
      - ${RPC_URL}
      - --entryPoint
      - ${AA_ENTRY_POINT_ADDRESS}
      - --unsafe
    depends_on:
      nginx-proxy:
        condition: service_healthy
    environment:
      LETSENCRYPT_HOST: paymaster.${DOMAIN}
    restart: unless-stopped
    networks:
      - default
    profiles:
      - staging
      - prod

  escrow:
    image: ${DOCKER_REGISTRY}/escrow:latest
    entrypoint: ["daemon"]
    depends_on:
      nginx-proxy:
        condition: service_healthy
        restart: true
    volumes:
      - ./docker/data/escrow:/data:ro

volumes:
  acme-html:
