<!DOCTYPE html>
<html>
<head>

  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Hostr — peer-to-peer short-term accommodation powered by Bitcoin and Nostr. Book and list stays with no middleman, no platform fees, and sovereign identity.">
  <meta name="keywords" content="hostr, bitcoin accommodation, nostr, peer-to-peer, short-term rental, p2p lodging, bitcoin travel">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FCFCFC">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Hostr — P2P Accommodation on Bitcoin & Nostr">
  <meta property="og:description" content="Book and list short-term stays peer-to-peer. No middleman, no platform fees — powered by Bitcoin and Nostr.">
  <meta property="og:url" content="https://hostr.network">
  <meta property="og:image" content="https://hostr.network/icons/Icon-512.png">
  <meta property="og:site_name" content="Hostr">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Hostr — P2P Accommodation on Bitcoin & Nostr">
  <meta name="twitter:description" content="Book and list short-term stays peer-to-peer. No middleman, no platform fees.">
  <meta name="twitter:image" content="https://hostr.network/icons/Icon-512.png">

  <!-- Canonical -->
  <link rel="canonical" href="https://hostr.network">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Hostr">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Hostr — P2P Accommodation on Bitcoin & Nostr</title>
  <link rel="manifest" href="manifest.json">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Hostr",
    "url": "https://hostr.network",
    "description": "Peer-to-peer short-term accommodation marketplace powered by Bitcoin and Nostr.",
    "applicationCategory": "TravelApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>

  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDbIij_LkLDQTePfWnoLo5bmqhDKS2xXbU&libraries=marker&loading=async"></script>
  <script defer src="https://unpkg.com/h3-js@4.2.1"></script>
  <script type="module" src="nostr_crypto.js"></script>

  <style>
    html,
    body {
      margin: 0;
      background: #FCFCFC;
    }

    @media (prefers-color-scheme: dark) {
      html,
      body {
        background: #121212;
      }
    }
  </style>

</head>
<body>
  <script src="flutter_bootstrap.js" defer></script>
</body>
</html>
