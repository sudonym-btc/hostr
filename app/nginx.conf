server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /clear-site-data {
        add_header Clear-Site-Data "\"cache\"" always;
        add_header Cache-Control "no-store" always;
        return 204;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /manifest.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location ~* ^/(?:flutter\.js|flutter_bootstrap\.js|main\.dart\.js|nostr_crypto\.js|flutter_service_worker\.js|version\.json|assetmanifest\.(?:json|bin)|fontmanifest\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    location ~* ^/(?:assets/|icons/).*\.(?:css|ico|svg|woff2?|png|jpg|jpeg|gif|webp|avif)$ {
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
        try_files $uri =404;
    }

    location ~* \.(?:ico|svg|woff2?|wasm|png|jpg|jpeg|gif|webp|avif)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location ~* \.(?:js|json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location ~* \.css$ {
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
        try_files $uri =404;
    }

    # Reverse-proxy for OpenTelemetry trace export.
    # Keeps the Grafana auth token server-side and avoids CORS issues
    # since the browser sees a same-origin request.
    location /otlp/ {
        proxy_pass https://otlp-gateway-prod-us-east-3.grafana.net/otlp/;
        proxy_set_header Host otlp-gateway-prod-us-east-3.grafana.net;
        proxy_set_header Authorization "Basic MTU1MzMxMjpnbGNfZXlKdklqb2lNVFk1TkRBMk1TSXNJbTRpT2lKbmNtRm1ZVzVoTFhOMFlXZHBibWNpTENKcklqb2lPWGxWUmtRM1J6VklaR0pxVnpnMVJEWTNZakpSTURoaElpd2liU0k2ZXlKeUlqb2ljSEp2WkMxMWN5MWxZWE4wTFRNaWZYMD0=";
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
