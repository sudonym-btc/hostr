server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    etag off;
    if_modified_since off;

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0, s-maxage=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Clear-Site-Data "\"cache\"" always;

        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;

        try_files $uri =404;
    }

    location ~* \.(?:js|css|json|wasm|png|jpg|jpeg|gif|webp|avif)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0, s-maxage=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Clear-Site-Data "\"cache\"" always;

        try_files $uri =404;
    }

    # Reverse-proxy for OpenTelemetry trace export.
    # Keeps the Grafana auth token server-side and avoids CORS issues
    # since the browser sees a same-origin request.
    location /otlp/ {
        proxy_pass https://otlp-gateway-prod-us-east-3.grafana.net/otlp/;
        proxy_set_header Host otlp-gateway-prod-us-east-3.grafana.net;
        proxy_set_header Authorization "Basic MTU1MzMxMjpnbGNfZXlKdklqb2lNVFk1TkRBMk1TSXNJbTRpT2lKbmNtRm1ZVzVoTFhOMFlXZHBibWNpTENKcklqb2lPWGxWUmtRM1J6VklaR0pxVnpnMVJEWTNZakpSTURoaElpd2liU0k2ZXlKeUlqb2ljSEp2WkMxMWN5MWxZWE4wTFRNaWZYMD0=";
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
