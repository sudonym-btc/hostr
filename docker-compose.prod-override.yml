# ──────────────────────────────────────────────────────────────
# docker-compose.prod-overrid.yml — Production TLS via Let's Encrypt
#
# Use alongside the main docker-compose.yml:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.prod-override.yml
#
# This override:
#   1. Removes the dev tls-init service
#   2. Adds nginxproxy/acme-companion for automatic Let's Encrypt certs
#   3. Adds LETSENCRYPT_HOST to each service for auto-provisioning
#
# Prerequisites:
#   - Services must be reachable from the internet on ports 80/443
#   - DNS A records must point to this host for all VIRTUAL_HOSTs
# ──────────────────────────────────────────────────────────────

services:
  # ── Disable dev-only services ─────────────────────────────────
  # tls-init: Replace with no-op (nginx-proxy depends on it completing)
  tls-init:
    entrypoint: ["true"]
    restart: "no"

  escrow-contract-deploy:
    profiles:
      - never

  anvil:
    profiles:
      - never

  bootstrap:
    profiles:
      - never

  # ACME companion auto-provisions Let's Encrypt certs for each
  # service that sets LETSENCRYPT_HOST and LETSENCRYPT_EMAIL.
  # Works with jwilder/nginx-proxy out of the box.
  acme-companion:
    image: nginxproxy/acme-companion
    depends_on:
      nginx-proxy:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/certs:/etc/nginx/certs
      - ./docker/vhost.d:/etc/nginx/vhost.d
      - acme-html:/usr/share/nginx/html
    environment:
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL:-admin@hostr.cc}
      - NGINX_PROXY_CONTAINER=hostr-nginx-proxy-1
    restart: unless-stopped

  # nginx-proxy needs the html volume for ACME challenges
  nginx-proxy:
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./docker/certs:/etc/nginx/certs
      - ./docker/vhost.d:/etc/nginx/vhost.d
      - ./docker/nginx-proxy.conf:/etc/nginx/conf.d/zzz_upload.conf:ro
      - acme-html:/usr/share/nginx/html

  # ── Add LETSENCRYPT_HOST to each public-facing service ───────

  relay:
    environment:
      - LETSENCRYPT_HOST=relay.${DOMAIN}

  blossom:
    environment:
      - LETSENCRYPT_HOST=blossom.${DOMAIN}

  # lnbits1, lnbits2, albyhub1, albyhub2 are dev-only (profiles: local, test)
  # and do not run in staging/production.

  landing-page:
    environment:
      - LETSENCRYPT_HOST=landing.${DOMAIN},${DOMAIN}

  # Hostr-owned RIF Relay for mainnet meta-transactions.
  # The long-lived server never receives the admin key; it only keeps its
  # manager/worker hot keys in the persistent workdir.
  rif-relay:
    hostname: rif-relay
    container_name: hostr-rif-relay
    build:
      context: .
      dockerfile: docker/rif-relay/Dockerfile
    depends_on:
      nginx-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8090/status >/dev/null"]
      timeout: 2s
      retries: 30
      interval: 10s
      start_period: 20s
    environment:
      - VIRTUAL_HOST=rifrelay.${DOMAIN}
      - VIRTUAL_PORT=8090
      - LETSENCRYPT_HOST=rifrelay.${DOMAIN}
      - NODE_ENV=mainnet
      - RIF_RELAY_PUBLIC_URL=https://rifrelay.${DOMAIN}
      - RIF_RELAY_ADDRESS_KEY=${RIF_RELAY_ADDRESS_KEY:-mainnet.30}
      - RIF_RELAY_RSK_NODE_URL=${RIF_RELAY_RSK_NODE_URL:-https://public-node.rsk.co}
      - RIF_RELAY_HUB_ADDRESS=${RIF_RELAY_HUB_ADDRESS}
      - RIF_RELAY_DEPLOY_VERIFIER_ADDRESS=${RIF_RELAY_DEPLOY_VERIFIER_ADDRESS}
      - RIF_RELAY_RELAY_VERIFIER_ADDRESS=${RIF_RELAY_RELAY_VERIFIER_ADDRESS}
      - RIF_RELAY_FEES_RECEIVER=${RIF_RELAY_FEES_RECEIVER:-0x0000000000000000000000000000000000000000}
      - RIF_RELAY_WORKER_MIN_BALANCE=${RIF_RELAY_WORKER_MIN_BALANCE:-100000000000000}
      - RIF_RELAY_WORKER_TARGET_BALANCE=${RIF_RELAY_WORKER_TARGET_BALANCE:-100000000000000}
      - RIF_RELAY_INITIAL_BLOCK_TO_SCAN=${RIF_RELAY_INITIAL_BLOCK_TO_SCAN:-1}
      - RIF_RELAY_LOG_LEVEL=${RIF_RELAY_LOG_LEVEL:-2}
      - RIF_RELAY_DISABLE_SPONSORED_TX=${RIF_RELAY_DISABLE_SPONSORED_TX:-false}
      - RIF_RELAY_GAS_FEE_PERCENTAGE=${RIF_RELAY_GAS_FEE_PERCENTAGE:-0}
      - REGISTER_STAKE=${RIF_RELAY_REGISTER_STAKE:-0.0001}
      - REGISTER_FUNDS=${RIF_RELAY_REGISTER_FUNDS:-0.02}
      - REGISTER_GAS_PRICE=${RIF_RELAY_REGISTER_GAS_PRICE:-60000000}
      - REGISTER_UNSTAKE_DELAY=${RIF_RELAY_REGISTER_UNSTAKE_DELAY:-1000}
    volumes:
      - ./docker/data/rif-relay:/srv/app/environment
    entrypoint:
      - /bin/bash
      - -lc
    command: |
      export RIF_RELAY_WORKDIR=/srv/app/environment
      /write_local_config.sh
      cd /rif-relay-server && npm run start
    restart: unless-stopped
    networks:
      - default

  # One-off relay admin job. Run this only from a bootstrap/admin context:
  # docker compose --profile relay-admin run --rm rif-relay-register
  rif-relay-register:
    build:
      context: .
      dockerfile: docker/rif-relay/Dockerfile
    depends_on:
      rif-relay:
        condition: service_healthy
    environment:
      - NODE_ENV=mainnet
      - RIF_RELAY_PUBLIC_URL=https://rifrelay.${DOMAIN}
      - RIF_RELAY_ADDRESS_KEY=${RIF_RELAY_ADDRESS_KEY:-mainnet.30}
      - RIF_RELAY_RSK_NODE_URL=${RIF_RELAY_RSK_NODE_URL:-https://public-node.rsk.co}
      - RIF_RELAY_HUB_ADDRESS=${RIF_RELAY_HUB_ADDRESS}
      - RIF_RELAY_DEPLOY_VERIFIER_ADDRESS=${RIF_RELAY_DEPLOY_VERIFIER_ADDRESS}
      - RIF_RELAY_RELAY_VERIFIER_ADDRESS=${RIF_RELAY_RELAY_VERIFIER_ADDRESS}
      - RIF_RELAY_FEES_RECEIVER=${RIF_RELAY_FEES_RECEIVER:-0x0000000000000000000000000000000000000000}
      - RIF_RELAY_WORKER_MIN_BALANCE=${RIF_RELAY_WORKER_MIN_BALANCE:-100000000000000}
      - RIF_RELAY_WORKER_TARGET_BALANCE=${RIF_RELAY_WORKER_TARGET_BALANCE:-100000000000000}
      - RIF_RELAY_INITIAL_BLOCK_TO_SCAN=${RIF_RELAY_INITIAL_BLOCK_TO_SCAN:-1}
      - RIF_RELAY_LOG_LEVEL=${RIF_RELAY_LOG_LEVEL:-2}
      - REGISTER_PRIVATE_KEY=${RIF_RELAY_ADMIN_PRIVATE_KEY}
      - REGISTER_STAKE=${RIF_RELAY_REGISTER_STAKE:-0.0001}
      - REGISTER_FUNDS=${RIF_RELAY_REGISTER_FUNDS:-0.02}
      - REGISTER_GAS_PRICE=${RIF_RELAY_REGISTER_GAS_PRICE:-60000000}
      - REGISTER_UNSTAKE_DELAY=${RIF_RELAY_REGISTER_UNSTAKE_DELAY:-1000}
    entrypoint:
      - /bin/bash
      - -lc
    command: |
      export RIF_RELAY_WORKDIR=/tmp/rif-relay-register
      /write_local_config.sh
      cd /rif-relay-server && npm run register
    restart: "no"
    networks:
      - default
    profiles:
      - relay-admin

  # Dart services don't need CA injection in prod — LE certs are
  # already in system trust stores.
  escrow:
    depends_on:
      nginx-proxy:
        condition: service_healthy
        restart: true
    volumes:
      - ./docker/data/escrow:/data:ro

  seed-relay:
    profiles:
      - never

volumes:
  acme-html:
