# Account-abstraction / paymaster stack (opt-in).
#
# Local mock paymaster, bundler (Alto), and ERC-4337 contract deployer.
# Only used in local development — add with:
#
#   docker compose -f compose.yaml -f compose.local.yaml \
#       -f compose.boltz.yaml -f compose.paymaster.yaml up

services:
  contract-deployer:
    image: ghcr.io/pimlicolabs/mock-contract-deployer:main
    environment:
      - ANVIL_RPC=http://anvil:8545
    restart: "no"
    networks:
      - default

  alto:
    image: ghcr.io/pimlicolabs/alto:latest
    entrypoint:
      - node
      - src/lib/cli/alto.js
      - run
      - --config
      - /app/alto-config.json
    depends_on:
      contract-deployer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:4337 -X POST -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_chainId\",\"params\":[],\"id\":1}' >/dev/null"]
      timeout: 3s
      retries: 30
      interval: 5s
      start_period: 10s
    ports:
      - 4337:4337
    volumes:
      - ./alto-config.json:/app/alto-config.json:ro
    networks:
      - default

  bundler:
    hostname: bundler
    container_name: hostr-bundler
    image: ghcr.io/pimlicolabs/mock-verifying-paymaster:main
    depends_on:
      contract-deployer:
        condition: service_completed_successfully
      alto:
        condition: service_healthy
      nginx-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/ping | grep -q 'pong'"]
      timeout: 3s
      retries: 30
      interval: 5s
      start_period: 10s
    environment:
      VIRTUAL_HOST: bundler.${DOMAIN}
      VIRTUAL_PORT: 3000
      ALTO_RPC: http://alto:4337
      ANVIL_RPC: http://anvil:8545
    ports:
      - 3010:3000
    networks:
      - default
