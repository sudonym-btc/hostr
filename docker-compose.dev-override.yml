# Development-only overrides — bind-mount source code for fast iteration.
#
# Landing page: static files are served directly by nginx; edits are
#               reflected on the next browser refresh.
# Escrow:       Dart source is bind-mounted and `dart pub get` runs on
#               every container start, so `docker compose restart escrow`
#               picks up code changes without a full image rebuild.

services:
  landing-page:
    volumes:
      - ./landing-page/index.html:/usr/share/nginx/html/index.html:ro
      - ./landing-page/assets:/usr/share/nginx/html/assets:ro

  escrow:
    volumes:
      - ./escrow:/workspace/escrow
      - ./hostr_sdk:/workspace/hostr_sdk
      - ./models:/workspace/models
    entrypoint:
      [
        "sh",
        "-c",
        "cd /workspace/escrow && dart pub get && if [ -z \"$$CONTRACT_ADDR\" ] && [ -f /data/contract_addr ]; then export CONTRACT_ADDR=$$(cat /data/contract_addr); fi && exec docker/entrypoint.sh",
      ]
