# Shared Hostr base stack.
#
# Loaded in EVERY environment. Contains only services that run everywhere
# (or that use profiles to opt-out of specific environments like `test`).
#
# Local infra (bitcoin, lightning, telemetry, …) → compose.local.yaml
# Boltz regtest                                   → compose.boltz.yaml
# Account-abstraction / paymaster                 → compose.paymaster.yaml
# Hosted / staging / prod overrides               → compose.hosted.yaml
#
# For local dev just run:
#   docker compose up          # auto-loads compose.override.yaml
#
# For hosted:
#   docker compose -f compose.yaml -f compose.hosted.yaml up

services:
  anvil:
    image: ${FOUNDRY_IMAGE:-ghcr.io/foundry-rs/foundry:latest}
    networks:
      - default

  nginx-proxy:
    image: jwilder/nginx-proxy
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./docker/certs:/etc/nginx/certs:ro
      - ./docker/vhost.d:/etc/nginx/vhost.d
      - ./docker/nginx-proxy.conf:/etc/nginx/conf.d/zzz_upload.conf:ro
    environment:
      - ENABLE_WEBSOCKETS=true
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    networks:
      default:
        aliases:
          - relay.${DOMAIN}
          - blossom.${DOMAIN}
          - bunker-nostr.${DOMAIN}
          - app.${DOMAIN}
          - ai.${DOMAIN}
          - telemetry.${DOMAIN}
          - ${DOMAIN}
          - lnbits.${DOMAIN}
          - alby.${DOMAIN}
          - anvil.${DOMAIN}
          - rsk.${DOMAIN}
          - arbitrum.${DOMAIN}
          - boltz.${DOMAIN}
          - paymaster.${DOMAIN}

  relay:
    # Local dev can build the pinned relay repo/commit. Hosted overlays pull
    # the same commit tag from the environment registry.
    image: hostr/nostr-rs-relay:${RELAY_IMAGE_TAG:-520d4c0}
    build:
      context: https://github.com/${RELAY_REPO:-sudonym-btc/nostr-rs-relay}.git#${RELAY_COMMIT:-520d4c0255f2d397443576de449ca4915a488f66}
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      relay-authz:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'timeout 2 bash -c ''exec 3<>/dev/tcp/127.0.0.1/80; printf "GET / HTTP/1.1\r\nHost: localhost\r\nUpgrade: websocket\r\nConnection: Upgrade\r\nSec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==\r\nSec-WebSocket-Version: 13\r\n\r\n" >&3; head -1 <&3'' | grep -q 101',
        ]
      interval: 30m
      timeout: 3s
      retries: 30
      start_period: 10s
    environment:
      - VIRTUAL_HOST=relay.${DOMAIN}
      - VIRTUAL_PORT=80
      - ENABLE_WEBSOCKETS=true
      - HTTPS_METHOD=noredirect
      - RUST_LOG=debug
      - nostr_rs_relay=debug
    ports:
      - "${RELAY_PORT}:80"
    volumes:
      - ./docker/${RELAY_TOML_FILE:-relay.development.toml}:/usr/src/app/config.toml
      - ./docker/data/relay:/usr/src/app/db
    networks:
      - default

  relay-authz:
    build:
      context: .
      dockerfile: relay-authz/Dockerfile
    restart: unless-stopped
    environment:
      - RELAY_AUTHZ_REQUIRE_AUTHOR_MATCH=true
      - RELAY_AUTHZ_AUTHOR_MISMATCH_KINDS=1059,32122,1326
      - RELAY_AUTHZ_PUBLIC_WRITE_KINDS=24133,13194,23194,23195,23196,23197
    expose:
      - "50051"
    networks:
      - default

  blossom:
    image: ghcr.io/hzrd149/blossom-server:6.1.5
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=blossom.${DOMAIN}
      - VIRTUAL_PORT=3000
      - BLOSSOM_PUBLIC_DOMAIN=blossom.${DOMAIN}
      - BLOSSOM_DASHBOARD_PASSWORD=${BLOSSOM_DASHBOARD_PASSWORD}
      - TMPDIR=/app/data
    ports:
      - "3001:3000"
    volumes:
      - ./docker/blossom.yaml:/app/config.yml
      - ./docker/data/blossom:/app/data
    networks:
      - default

  escrow:
    restart: unless-stopped
    depends_on:
      nginx-proxy:
        condition: service_healthy
    environment:
      - PRIVATE_KEY=${ESCROW_PRIVATE_KEY}
      - ENV=${COMPOSE_PROFILES:-dev}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    volumes:
      - ./docker/data/escrow:/data:ro
      - ./docker/tls/ca/ca.crt:/tls/ca.crt:ro
    networks:
      - default

  app:
    restart: unless-stopped
    build:
      context: .
      dockerfile: app/Dockerfile.web
      args:
        APP_PROFILE: ${COMPOSE_PROFILES:-local}
        GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    environment:
      - VIRTUAL_HOST=app.${DOMAIN},${DOMAIN}
      - VIRTUAL_PORT=80
    networks:
      - default
    profiles:
      - local
      - staging
      - prod

  mcp:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ai/mcp-server/Dockerfile
    environment:
      - VIRTUAL_HOST=ai.${DOMAIN}
      - VIRTUAL_PORT=8787
      - DOMAIN=${DOMAIN}
      - MCP_PUBLIC_BASE_URL=https://ai.${DOMAIN}
      - MCP_JWT_SECRET=${MCP_JWT_SECRET:-hostr-development-mcp-secret-change-me}
      - MCP_DEV_AUTH_ENABLED=${MCP_DEV_AUTH_ENABLED:-0}
    networks:
      - default
    profiles:
      - local
      - staging
      - prod

networks:
  default:
    driver: bridge
