name: hostr_cli
description: Hostr command-line interface for desktop agents and local automation.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.8

executables:
  hostr: hostr
  hostr-cli: hostr
  hostr-daemon: hostr_daemon

dependencies:
  args: ^2.7.0
  crypto: ^3.0.7
  hostr_sdk:
    path: ../hostr_sdk
  logger: ^2.6.2
  logging: ^1.3.0
  mime: ^2.0.0
  models:
    path: ../models
  ndk: ^0.7.1
  path: ^1.9.1
  qr: ^3.0.2
  sqlite3: ^3.1.7

dev_dependencies:
  lints: ^6.1.0
  test: ^1.29.0

dependency_overrides:
  ndk:
    git:
      url: https://github.com/sudonym-btc/ndk.git
      ref: feat/hostr-fixes
      path: packages/ndk
  freezed_annotation: ^3.1.0
  pointycastle: ^4.0.0
  js: ^0.7.2
