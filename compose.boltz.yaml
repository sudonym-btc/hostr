# Boltz regtest stack + Hostr-specific overrides.
#
# Loaded automatically via compose.override.yaml (include) for local/test.
# Paths in this file are relative to the Hostr repo root.

include:
  - path: ./dependencies/boltz-regtest/docker-compose.yml
    env_file:
      - ./dependencies/boltz-regtest/.env

x-boltz-lnd-command: &boltz-lnd-command
  - --listen=0.0.0.0:9735
  - --rpclisten=0.0.0.0:10009
  - --restlisten=0.0.0.0:8081
  - --bitcoin.timelockdelta=18
  - --bitcoin.active
  - --bitcoin.regtest
  - --bitcoin.node=bitcoind
  - --bitcoind.rpchost=bitcoind
  - --bitcoind.zmqpubrawtx=bitcoind:29000
  - --bitcoind.zmqpubrawblock=bitcoind:29001
  - --bitcoind.rpccookie=/app/bitcoin/regtest/.cookie
  - --noseedbackup
  - --protocol.wumbo-channels
  - --lnddir=/app/lnd
  - --maxpendingchannels=10

x-boltz-bitcoind-command: &boltz-bitcoind-command
  - -regtest
  - -datadir=/app/bitcoin
  - -fallbackfee=0.00000253
  - -mintxfee=0.000001
  - -zmqpubrawtx=tcp://0.0.0.0:29000
  - -zmqpubrawblock=tcp://0.0.0.0:29001
  - -txindex
  - -rpcallowip=0.0.0.0/0
  - -rpcbind=0.0.0.0
  - -deprecatedrpc=warnings

services:

  bitcoind:
    command: *boltz-bitcoind-command

  elementsd:
    healthcheck:
      start_period: 10s

  anvil:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}

  anvil-arbitrum:
    hostname: anvil-arbitrum
    container_name: boltz-anvil-arbitrum
    image: ${FOUNDRY_IMAGE:-ghcr.io/foundry-rs/foundry:latest}
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    entrypoint: "anvil --host 0.0.0.0 --chain-id 412346"
    environment:
      - VIRTUAL_HOST=arbitrum.${DOMAIN}
      - VIRTUAL_PORT=8545
    ports:
      - 8546:8545
    healthcheck:
      test: ["CMD", "cast", "chain-id", "--rpc-url", "http://127.0.0.1:8545"]
      timeout: 2s
      retries: 5
      interval: 1s
      start_period: 1s
    networks:
      - default

  arbitrum-init:
    image: ${FOUNDRY_IMAGE:-ghcr.io/foundry-rs/foundry:latest}
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    container_name: boltz-arbitrum-init
    restart: "no"
    depends_on:
      anvil-arbitrum:
        condition: service_healthy
    volumes:
      - ./docker/scripts/arbitrum-init.sh:/scripts/arbitrum-init.sh:ro
      - ./dependencies/boltz-regtest/images/scripts/utils.sh:/scripts/boltz-utils.sh:ro
    entrypoint: ["sh", "/scripts/arbitrum-init.sh"]
    environment:
      - BOLTZ_WALLET_ADDRESS=${BOLTZ_WALLET_ADDRESS:-}
    networks:
      - default

  boltz-backend:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    depends_on:
      arbitrum-init:
        condition: service_completed_successfully
    volumes:
      - ./docker/boltz.conf:/boltz-data/boltz.conf:ro
      - ./docker/patches/DataAggregator.js:/boltz-backend/dist/lib/rates/data/DataAggregator.js:ro
    healthcheck:
      start_period: 120s

  boltz-backend-nginx:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    environment:
      - VIRTUAL_HOST=boltz.${DOMAIN}
      - VIRTUAL_PORT=9001

  boltz-client:
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/arm64}
    profiles: ['never']

  esplora:
    profiles: ['never']

  otterscan:
    environment:
      - VIRTUAL_HOST=otterscan.${DOMAIN}
      - VIRTUAL_PORT=80
    profiles: ['local']

  redis:
    volumes:
      - ./dependencies/boltz-regtest/redis/cache.conf:/usr/local/etc/redis/redis.conf:ro

  electrs:
    profiles: ['default', 'backend-dev', 'webapp-ci']
    deploy:
      replicas: 0

  electrs-liquid:
    profiles: ['default', 'backend-dev', 'webapp-ci']
    deploy:
      replicas: 0

  lnd-1:
    platform: ${LND_PLATFORM:-linux/arm64}
    command: *boltz-lnd-command

  lnd-2:
    platform: ${LND_PLATFORM:-linux/arm64}
    command: *boltz-lnd-command

  lnd-3:
    platform: ${LND_PLATFORM:-linux/arm64}

volumes:
  boltz-data:
    name: boltz-backend-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dependencies/boltz-regtest/data/backend
  boltz-client-data:
    name: boltz-client-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dependencies/boltz-regtest/data/boltz-client
  bitcoin-data:
    name: boltz-bitcoind-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dependencies/boltz-regtest/data/bitcoind
  elements-data:
    name: boltz-elements-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dependencies/boltz-regtest/data/elements
  cln1-data:
    name: boltz-cln1-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dependencies/boltz-regtest/data/cln1
  cln2-data:
    name: boltz-cln2-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dependencies/boltz-regtest/data/cln2
  lnd1-data:
    name: boltz-lnd1-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dependencies/boltz-regtest/data/lnd1
  lnd2-data:
    name: boltz-lnd2-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dependencies/boltz-regtest/data/lnd2
  lnd3-data:
    name: boltz-lnd3-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dependencies/boltz-regtest/data/lnd3
  nginx-data:
    name: boltz-nginx-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dependencies/boltz-regtest/data/backend-nginx/
  arkd-data:
    name: arkd-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dependencies/boltz-regtest/data/arkd
  fulmine-data:
    name: fulmine-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dependencies/boltz-regtest/data/fulmine
