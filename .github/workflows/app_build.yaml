name: Build Apps

run-name: >-
  Build Apps ·
  ${{ github.event_name == 'workflow_dispatch' && inputs.variant || 'staging' }}

# Called automatically by CI after semantic-release publishes a new version,
# or triggered manually to build a specific variant.
on:
  workflow_call:          # invoked from ci.yaml after a release (staging only)
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      track:
        description: 'Play Store / TestFlight track used when uploads are enabled'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      confirm_production_release:
        description: 'Required for manual production variant releases'
        required: false
        default: false
        type: boolean

concurrency:
  group: app-build-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.variant || 'staging' }}
  cancel-in-progress: false

env:
  ENABLE_APP_STORE_UPLOADS: 'false'

jobs:
  validate_release_request:
    name: Validate release request
    runs-on: ubuntu-latest
    steps:
      - name: Enforce safe release rules
        env:
          EVENT_NAME: ${{ github.event_name }}
          VARIANT: ${{ github.event_name == 'workflow_dispatch' && inputs.variant || 'staging' }}
          TRACK: ${{ github.event_name == 'workflow_dispatch' && inputs.track || 'internal' }}
          CONFIRM_PRODUCTION_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm_production_release || false }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" != "workflow_dispatch" ]]; then
            if [[ "$VARIANT" != "staging" || "$TRACK" != "internal" ]]; then
              echo "::error::Automatic app builds are limited to staging/internal."
              exit 1
            fi

            echo "Automatic app build validated: staging/internal only."
            exit 0
          fi

          if [[ "$VARIANT" == "staging" && "$TRACK" != "internal" ]]; then
            echo "::error::Staging builds may only target the internal track/group."
            exit 1
          fi

          if [[ "$VARIANT" != "production" && "$TRACK" == "production" ]]; then
            echo "::error::Only the production variant may target the production track."
            exit 1
          fi

          if [[ "$VARIANT" == "production" && "$CONFIRM_PRODUCTION_RELEASE" != "true" ]]; then
            echo "::error::Manual production builds require confirm_production_release=true."
            exit 1
          fi

          echo "Manual app build validated: $VARIANT -> $TRACK"

  # ── Android — Staging (points to staging.hostr.network) ────────────────────
  build_android_staging:
    name: Android — Staging
    needs: validate_release_request
    runs-on: ubuntu-latest
    environment: staging
    # On workflow_call: always build staging. On manual: only when variant=staging.
    if: github.event_name != 'workflow_dispatch' || inputs.variant == 'staging'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.1'

      - name: Install dependencies
        run: flutter pub get
        working-directory: app

      - name: Set build metadata
        run: |
          echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%F)" >> $GITHUB_ENV
          echo "COMMIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > app/android/upload-keystore.jks

      - name: Set up signing config
        run: |
          cat >> app/android/local.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          flutter.sdk=$HOME/flutter
          EOF

      - name: Build App Bundle (staging)
        run: |
          flutter build appbundle \
            --build-number=$BUILD_NUMBER \
            --dart-define=COMMIT_SHA=$COMMIT_SHA \
            --dart-define=BUILD_DATE=$BUILD_DATE \
            -t lib/main_staging.dart \
            --release
        working-directory: app

      # App store uploads are temporarily disabled. Set
      # ENABLE_APP_STORE_UPLOADS=true when we are ready to submit builds again.
      - name: Upload to Play Store (internal)
        if: env.ENABLE_APP_STORE_UPLOADS == 'true'
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_CREDENTIALS }}
          packageName: com.sudonym.hostr
          releaseFiles: app/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  # ── Android — Production (points to hostr.network) ──────────────────────────
  build_android_production:
    name: Android — Production
    needs: validate_release_request
    runs-on: ubuntu-latest
    environment: production
    # Production builds are manual-only and require explicit confirmation.
    if: github.event_name == 'workflow_dispatch' && inputs.variant == 'production' && inputs.confirm_production_release
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.1'

      - name: Install dependencies
        run: flutter pub get
        working-directory: app

      - name: Set build metadata
        run: |
          echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%F)" >> $GITHUB_ENV
          echo "COMMIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > app/android/upload-keystore.jks

      - name: Set up signing config
        run: |
          cat >> app/android/local.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          flutter.sdk=$HOME/flutter
          EOF

      - name: Build App Bundle (production)
        run: |
          flutter build appbundle \
            --build-number=$BUILD_NUMBER \
            --dart-define=COMMIT_SHA=$COMMIT_SHA \
            --dart-define=BUILD_DATE=$BUILD_DATE \
            -t lib/main_production.dart \
            --release
        working-directory: app

      # App store uploads are temporarily disabled. Set
      # ENABLE_APP_STORE_UPLOADS=true when we are ready to submit builds again.
      - name: Upload to Play Store
        if: env.ENABLE_APP_STORE_UPLOADS == 'true'
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_CREDENTIALS }}
          packageName: com.sudonym.hostr
          releaseFiles: app/build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track || 'internal' }}
          status: completed

  # ── iOS — Staging (points to staging.hostr.network) ────────────────────────
  build_ios_staging:
    name: iOS — Staging
    needs: validate_release_request
    runs-on: macos-latest
    environment: staging
    if: github.event_name != 'workflow_dispatch' || inputs.variant == 'staging'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.1'

      - name: Install dependencies
        run: flutter pub get
        working-directory: app

      - name: Set build metadata
        run: |
          echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%F)" >> $GITHUB_ENV
          echo "COMMIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Import certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Install provisioning profile
        run: |
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/hostr.mobileprovision"
          mkdir -p "$(dirname "$PP_PATH")"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "$PP_PATH"

      - name: Override signing for CI
        working-directory: app
        run: |
          echo 'CODE_SIGN_STYLE=Manual'              >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGN_IDENTITY=Apple Distribution' >> ios/Flutter/Release.xcconfig
          echo 'PROVISIONING_PROFILE_SPECIFIER=hostr AppStore' >> ios/Flutter/Release.xcconfig
          echo "── Release.xcconfig ──"
          cat ios/Flutter/Release.xcconfig

      - name: Build IPA (staging)
        run: |
          flutter build ipa \
            -t lib/main_staging.dart \
            --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=COMMIT_SHA=$COMMIT_SHA \
            --dart-define=BUILD_DATE=$BUILD_DATE \
            --export-options-plist=ios/ExportOptions.plist
        working-directory: app

      # App store uploads are temporarily disabled. Set
      # ENABLE_APP_STORE_UPLOADS=true when we are ready to submit builds again.
      - name: Resolve IPA path
        if: env.ENABLE_APP_STORE_UPLOADS == 'true'
        run: echo "IPA_PATH=$(ls app/build/ios/ipa/*.ipa)" >> $GITHUB_ENV

      - name: Upload to TestFlight
        if: env.ENABLE_APP_STORE_UPLOADS == 'true'
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

  # ── iOS — Production (points to hostr.network) ─────────────────────────────
  build_ios_production:
    name: iOS — Production
    needs: validate_release_request
    runs-on: macos-latest
    environment: production
    # Production builds are manual-only and require explicit confirmation.
    if: github.event_name == 'workflow_dispatch' && inputs.variant == 'production' && inputs.confirm_production_release
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.1'

      - name: Install dependencies
        run: flutter pub get
        working-directory: app

      - name: Set build metadata
        run: |
          echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%F)" >> $GITHUB_ENV
          echo "COMMIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Import certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Install provisioning profile
        run: |
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/hostr.mobileprovision"
          mkdir -p "$(dirname "$PP_PATH")"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "$PP_PATH"

      - name: Override signing for CI
        working-directory: app
        run: |
          echo 'CODE_SIGN_STYLE=Manual'              >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGN_IDENTITY=Apple Distribution' >> ios/Flutter/Release.xcconfig
          echo 'PROVISIONING_PROFILE_SPECIFIER=hostr AppStore' >> ios/Flutter/Release.xcconfig
          echo "── Release.xcconfig ──"
          cat ios/Flutter/Release.xcconfig

      - name: Build IPA (production)
        run: |
          flutter build ipa \
            -t lib/main_production.dart \
            --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=COMMIT_SHA=$COMMIT_SHA \
            --dart-define=BUILD_DATE=$BUILD_DATE \
            --export-options-plist=ios/ExportOptions.plist
        working-directory: app

      # App store uploads are temporarily disabled. Set
      # ENABLE_APP_STORE_UPLOADS=true when we are ready to submit builds again.
      - name: Resolve IPA path
        if: env.ENABLE_APP_STORE_UPLOADS == 'true'
        run: echo "IPA_PATH=$(ls app/build/ios/ipa/*.ipa)" >> $GITHUB_ENV

      - name: Upload to TestFlight
        if: env.ENABLE_APP_STORE_UPLOADS == 'true'
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
