name: Compose Redeploy

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: Hosted environment to redeploy
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  redeploy:
    name: Pull and restart compose services
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Pull latest images and restart compose services
        run: |
          case "${{ inputs.target_env }}" in
            staging)
              PROJECT_ID="hostr-staging-d4c52998"
              LEGACY_VM_NAME="hostr-staging-compose"
              MIG_NAME="hostr-staging-compose-mig"
              DEPLOY_ENV="staging"
              ZONE="us-central1-b"
              ;;
            production)
              PROJECT_ID="hostr-production-d3ba05b4"
              LEGACY_VM_NAME="hostr-production-compose"
              MIG_NAME="hostr-production-compose-mig"
              DEPLOY_ENV="production"
              ZONE="us-central1-b"
              ;;
            *)
              echo "Unsupported environment: ${{ inputs.target_env }}" >&2
              exit 64
              ;;
          esac

          VM_NAME="$(gcloud compute instance-groups managed list-instances "$MIG_NAME" \
            --project "$PROJECT_ID" \
            --zone "$ZONE" \
            --uri 2>/dev/null | awk -F/ '/\/instances\// {print $NF; exit}')"
          VM_NAME="${VM_NAME:-$LEGACY_VM_NAME}"
          echo "Redeploying $DEPLOY_ENV on $VM_NAME"

          gcloud compute ssh "$VM_NAME" \
            --project "$PROJECT_ID" \
            --zone "$ZONE" \
            --quiet \
            --command "sudo bash -lc 'set -e; cd /opt/hostr && if [[ -n \"\$(git diff --name-only --diff-filter=ACMRTUXB)\" ]]; then echo \"Stashing modified /opt/hostr files before deploy\"; git diff --name-only --diff-filter=ACMRTUXB -z | xargs -0 -r git stash push -m \"hostr-deploy preflight \$(date -u +%Y%m%dT%H%M%SZ)\" --; fi; /usr/local/bin/hostr-deploy \"$DEPLOY_ENV\"'"
