name: One-off Production Compose VM Wait

on:
  workflow_dispatch:

jobs:
  wait:
    name: Wait for production compose VM
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Wait for production compose VM
        run: |
          gcloud compute instance-groups managed wait-until hostr-production-compose-mig \
            --project hostr-production-d3ba05b4 \
            --zone us-central1-b \
            --stable \
            --timeout=1200
